'use client';

import { useState, useTransition } from 'react';
import { useRouter } from 'next/navigation';
import { createPost } from '@/app/actions/matchActions';
import type { PostCategory } from '@/types/database.types';

const CATEGORIES: { value: PostCategory; label: string; emoji: string }[] = [
  { value: 'SPORTS', label: '스포츠', emoji: '⚽' },
  { value: 'STUDY', label: '스터디', emoji: '📚' },
  { value: 'CONTEST', label: '공모전', emoji: '🏆' },
];

export default function NewPostPage() {
  const router = useRouter();
  const [isPending, startTransition] = useTransition();
  const [error, setError] = useState('');
  const [category, setCategory] = useState<PostCategory>('STUDY');

  async function handleSubmit(e: React.FormEvent<HTMLFormElement>) {
    e.preventDefault();
    setError('');
    const fd = new FormData(e.currentTarget);

    startTransition(async () => {
      const result = await createPost({
        title: fd.get('title') as string,
        content: fd.get('content') as string,
        category,
        maxMembers: Number(fd.get('maxMembers')),
        contact: fd.get('contact') as string,
        deadline: (fd.get('deadline') as string) || undefined,
      });

      if (result.success) {
        router.push(`/posts/${result.data.postId}`);
      } else {
        setError(result.error);
      }
    });
  }

  return (
    <div className="page-container fade-up" style={{ paddingTop: '32px', paddingBottom: '80px', maxWidth: '640px' }}>
      <h1 style={{ fontSize: '24px', fontWeight: '800', letterSpacing: '-0.03em', marginBottom: '6px' }}>모집 글 작성</h1>
      <p style={{ fontSize: '13px', color: 'var(--text-muted)', marginBottom: '32px' }}>모집 정보를 입력해 주세요. 연락처는 수락된 신청자에게만 공개됩니다.</p>

      <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
        {/* 카테고리 */}
        <div>
          <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-secondary)', display: 'block', marginBottom: '8px' }}>
            카테고리 <span style={{ color: 'var(--accent-red)' }}>*</span>
          </label>
          <div style={{ display: 'flex', gap: '8px' }}>
            {CATEGORIES.map(({ value, label, emoji }) => (
              <button key={value} type="button" onClick={() => setCategory(value)}
                style={{
                  flex: 1, padding: '10px', borderRadius: '10px', fontSize: '13px', fontWeight: '600',
                  border: '1px solid',
                  borderColor: category === value ? 'var(--accent-blue)' : 'var(--border)',
                  background: category === value ? 'rgba(59,130,246,0.12)' : 'var(--bg-elevated)',
                  color: category === value ? 'var(--accent-blue)' : 'var(--text-secondary)',
                  cursor: 'pointer', fontFamily: 'inherit', transition: 'all 0.15s',
                }}>
                {emoji} {label}
              </button>
            ))}
          </div>
        </div>

        {/* 제목 */}
        <div>
          <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-secondary)', display: 'block', marginBottom: '6px' }}>
            제목 <span style={{ color: 'var(--accent-red)' }}>*</span>
          </label>
          <input name="title" required minLength={2} maxLength={100} placeholder="모집 글 제목을 입력하세요" className="input-base" />
        </div>

        {/* 내용 */}
        <div>
          <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-secondary)', display: 'block', marginBottom: '6px' }}>
            내용 <span style={{ color: 'var(--accent-red)' }}>*</span>
          </label>
          <textarea name="content" required minLength={10} maxLength={3000}
            placeholder="활동 소개, 모집 조건, 일정 등을 자유롭게 작성하세요"
            className="input-base" style={{ resize: 'vertical', minHeight: '160px' }} />
        </div>

        {/* 모집 인원 + 마감일 */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
          <div>
            <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-secondary)', display: 'block', marginBottom: '6px' }}>
              모집 인원 <span style={{ color: 'var(--accent-red)' }}>*</span>
            </label>
            <input name="maxMembers" type="number" required min={1} max={20} defaultValue={4} className="input-base" />
          </div>
          <div>
            <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-secondary)', display: 'block', marginBottom: '6px' }}>
              마감일 <span style={{ color: 'var(--text-muted)', fontWeight: '400' }}>(선택)</span>
            </label>
            <input name="deadline" type="date" className="input-base"
              min={new Date().toISOString().split('T')[0]} />
          </div>
        </div>

        {/* 연락처 */}
        <div>
          <label style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-secondary)', display: 'block', marginBottom: '6px' }}>
            연락처 <span style={{ color: 'var(--accent-red)' }}>*</span>
          </label>
          <input name="contact" required placeholder="카카오 오픈채팅 링크, 전화번호 등" className="input-base" />
          <p style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>
            🔐 연락처는 AES-256-GCM으로 암호화 저장되며, 수락된 신청자에게만 공개됩니다
          </p>
        </div>

        {error && <div className="error-box">{error}</div>}

        <div style={{ display: 'flex', gap: '10px', paddingTop: '8px' }}>
          <button type="button" onClick={() => router.back()} className="btn-secondary" style={{ flex: 1 }}>취소</button>
          <button type="submit" disabled={isPending} className="btn-primary" style={{ flex: 2 }}>
            {isPending ? <span className="spinner" /> : '게시글 등록'}
          </button>
        </div>
      </form>
    </div>
  );
}
